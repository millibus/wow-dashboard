<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ Deaths Edge — Guild Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="header-title">
      <span class="sword">⚔️</span>
      <div>
        <h1>Deaths Edge</h1>
        <p class="subtitle">Guild Dashboard — Onyxia-US</p>
      </div>
    </div>
    <div class="header-right">
      <div class="guild-toggle">
        <button class="guild-toggle-btn active" data-slug="deaths-edge" onclick="switchGuild('deaths-edge')">🔴 Deaths Edge</button>
        <button class="guild-toggle-btn" data-slug="riot-act" onclick="switchGuild('riot-act')">🔵 Riot Act</button>
      </div>
      <span id="last-updated" class="last-updated"></span>
      <button class="btn-refresh" onclick="loadGuild(true)">↻ Refresh</button>
    </div>
  </div>
  <div class="guild-stats" id="guild-stats"></div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar">
  <div class="filter-bar-section">
    <div class="filter-bar-label">Search</div>
    <input type="text" id="search" class="filter-search" placeholder="Name, class, race..." oninput="onSearch(this.value)">
  </div>
  <div class="filter-bar-section">
    <div class="filter-bar-label">Owner</div>
    <div class="filter-bar-pills" id="filter-owners"></div>
  </div>
  <div class="filter-bar-section">
    <div class="filter-bar-label">Class</div>
    <div class="filter-bar-pills" id="filter-classes"></div>
  </div>
  <div class="filter-bar-section">
    <div class="filter-bar-label">Race</div>
    <div class="filter-bar-pills" id="filter-races"></div>
  </div>
  <div class="filter-bar-section">
    <div class="filter-bar-label">Level</div>
    <div class="filter-bar-pills">
      <button class="level-btn active" onclick="onLevelFilter('0', this)">All</button>
      <button class="level-btn" onclick="onLevelFilter('70', this)">70+</button>
      <button class="level-btn" onclick="onLevelFilter('80', this)">80+</button>
    </div>
  </div>
  <div class="filter-bar-section">
    <div class="filter-bar-label">Sort by</div>
    <select id="sort-select" class="sort-select" onchange="onSortChange(this.value)">
      <option value="ilvl">Item Level ↓</option>
      <option value="level">Level ↓</option>
      <option value="name">Name A–Z</option>
      <option value="class">Class</option>
      <option value="race">Race</option>
      <option value="owner">Owner</option>
    </select>
  </div>
  <div class="filter-bar-section" style="justify-content:flex-end;margin-left:auto;align-self:flex-end">
    <button class="btn-compare-mode" id="btn-compare-mode" onclick="toggleCompareMode()">⚔ Compare</button>
  </div>
</div>

<!-- COMPARE BAR -->
<div id="compare-bar" class="compare-bar hidden">
  <div class="compare-bar-inner">
    <span id="compare-char1" class="compare-name">— Pick a character</span>
    <span class="vs">VS</span>
    <span id="compare-char2" class="compare-name">— Pick a character</span>
    <button class="btn-compare-go" id="btn-compare-go" onclick="doCompare()" disabled>Compare ▶</button>
    <button class="btn-cancel" onclick="cancelCompare()">✕ Cancel</button>
  </div>
</div>

<!-- RESULTS / CHIPS -->
<div class="results-bar" id="active-chips"></div>

<!-- MAIN GRID -->
<div class="main-content">
  <div id="character-grid" class="character-grid"></div>
</div>

<!-- Character Detail Modal -->
<div id="modal" class="modal hidden" onclick="closeModal(event)">
  <div class="modal-content" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Compare Modal -->
<div id="compare-modal" class="modal hidden" onclick="closeCompareModal(event)">
  <div class="modal-content modal-wide">
    <button class="modal-close" onclick="closeCompareModal()">✕</button>
    <div id="compare-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
