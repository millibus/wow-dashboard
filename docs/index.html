<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ Deaths Edge — Guild Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">
      <span class="sword">⚔️</span>
      <div>
        <h1>Deaths Edge</h1>
        <p class="subtitle">Guild Dashboard — Onyxia-US</p>
      </div>
    </div>
    <div class="header-right">
      <span id="last-updated" class="last-updated"></span>
      <button class="btn-refresh" onclick="loadGuild(true)">↻ Refresh</button>
    </div>
  </div>
  <div class="guild-stats" id="guild-stats"></div>
</header>

<!-- Compare bar -->
<div id="compare-bar" class="compare-bar hidden">
  <div class="compare-bar-inner">
    <span id="compare-char1" class="compare-name">— Pick a character</span>
    <span class="vs">VS</span>
    <span id="compare-char2" class="compare-name">— Pick a character</span>
    <button class="btn-compare-go" id="btn-compare-go" onclick="doCompare()" disabled>Compare ▶</button>
    <button class="btn-cancel" onclick="cancelCompare()">✕ Cancel</button>
  </div>
</div>

<div class="layout">

  <!-- Sidebar Filter Panel -->
  <aside class="filter-panel">
    <div class="filter-section">
      <label class="filter-label">🔍 Search</label>
      <input type="text" id="search" class="search-input" placeholder="Name, class, spec, race..." oninput="onSearch(this.value)">
    </div>

    <div class="filter-section">
      <label class="filter-label">👤 Owner</label>
      <div class="pill-group" id="filter-owners"></div>
    </div>

    <div class="filter-section">
      <label class="filter-label">⚔️ Class</label>
      <div class="pill-group" id="filter-classes"></div>
    </div>

    <div class="filter-section">
      <label class="filter-label">🧬 Race</label>
      <div class="pill-group" id="filter-races"></div>
    </div>

    <div class="filter-section">
      <label class="filter-label">📊 Level</label>
      <div class="pill-group">
        <button class="level-btn active" onclick="onLevelFilter('0', this)">All</button>
        <button class="level-btn" onclick="onLevelFilter('70', this)">70+</button>
        <button class="level-btn" onclick="onLevelFilter('80', this)">80+</button>
      </div>
    </div>

    <div class="filter-section">
      <label class="filter-label">↕️ Sort by</label>
      <select id="sort-select" class="sort-select" onchange="onSortChange(this.value)">
        <option value="ilvl">Item Level ↓</option>
        <option value="level">Character Level ↓</option>
        <option value="name">Name A–Z</option>
        <option value="class">Class A–Z</option>
        <option value="race">Race A–Z</option>
        <option value="owner">Owner</option>
      </select>
    </div>

    <div class="filter-section">
      <button class="btn-compare-mode" id="btn-compare-mode" onclick="toggleCompareMode()">⚔ Compare Mode</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content-area">
    <div id="active-chips" class="active-chips"></div>
    <div id="character-grid" class="character-grid"></div>
  </main>

</div>

<!-- Character Detail Modal -->
<div id="modal" class="modal hidden" onclick="closeModal(event)">
  <div class="modal-content" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Compare Modal -->
<div id="compare-modal" class="modal hidden" onclick="closeCompareModal(event)">
  <div class="modal-content modal-wide" id="compare-content">
    <button class="modal-close" onclick="closeCompareModal()">✕</button>
    <div id="compare-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
